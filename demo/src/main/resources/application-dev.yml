server:
  port: 8080

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/internship?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai
    username: root
    password: 123456
    driver-class-name: com.mysql.cj.jdbc.Driver
  data:
    redis:
      host: localhost
      port: 6379
      password: 123456
  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 5MB

mybatis-plus:
  mapper-locations: classpath:mapper/*.xml
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

jwt:
  access-secret: internship-access-secret-key-2026-must-be-at-least-256-bits-long
  access-expiration: 7200000
  refresh-secret: internship-refresh-secret-key-2026-must-be-at-least-256-bits-long
  refresh-expiration: 604800000

file:
  upload-dir: ./uploads/resumes
  max-size: 5242880
